
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale="1.0">
<title>Live Option Chain Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#0b1220;color:#fff;margin:0;padding:24px}
h1{margin:0} .sub{color:#9ca3af;margin:8px 0 20px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{background:#182235;border-radius:16px;padding:16px}
.metric{display:flex;justify-content:space-between;margin:6px 0}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #334155;text-align:center}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:20px}
.panel{background:#fff;border-radius:12px;padding:10px}
canvas{height:280px!important}
</style>
</head>
<body>
<h1>📈 Live Option Chain Dashboard</h1>
<div class="sub">Refreshes every 30 seconds from /dashboard.json</div>
<div class="cards" id="cards"></div>
<table><thead><tr><th>Index</th><th>Spot</th><th>PCR</th><th>Change OI PCR</th><th>VWAP</th></tr></thead><tbody id="tbody"></tbody></table>
<div class="grid">
<div class="panel"><canvas id="cN"></canvas></div>
<div class="panel"><canvas id="cB"></canvas></div>
<div class="panel"><canvas id="cF"></canvas></div>
<div class="panel"><canvas id="cM"></canvas></div>
</div>
<script>
const names=["NIFTY","BANKNIFTY","FINNIFTY","MIDCPNIFTY"];
const hist={}; const charts={};
function makeChart(id,label){
 hist[label]={labels:[],data:[]};
 charts[label]=new Chart(document.getElementById(id),{
  type:'line',
  data:{labels:hist[label].labels,datasets:[{label:label+" PCR",data:hist[label].data,borderWidth:2}]},
  options:{responsive:true,animation:false}
 });
}
makeChart("cN","NIFTY");
makeChart("cB","BANKNIFTY");
makeChart("cF","FINNIFTY");
makeChart("cM","MIDCPNIFTY");

async function load(){
 const res=await fetch('/dashboard.json');
 const data=await res.json();
 const cards=document.getElementById('cards');
 const tbody=document.getElementById('tbody');
 cards.innerHTML=''; tbody.innerHTML='';
 data.forEach(r=>{
  cards.innerHTML+=`<div class="card"><h3>${r.Index}</h3>
  <div class="metric"><span>Spot</span><span>${Number(r.Spot).toFixed(2)}</span></div>
  <div class="metric"><span>PCR</span><span>${Number(r.PCR).toFixed(3)}</span></div>
  <div class="metric"><span>Chg PCR</span><span>${Number(r.Change_OI_PCR).toFixed(3)}</span></div>
  <div class="metric"><span>VWAP</span><span>${Number(r.VWAP).toFixed(2)}</span></div></div>`;
  tbody.innerHTML+=`<tr><td>${r.Index}</td><td>${Number(r.Spot).toFixed(2)}</td><td>${Number(r.PCR).toFixed(3)}</td><td>${Number(r.Change_OI_PCR).toFixed(3)}</td><td>${Number(r.VWAP).toFixed(2)}</td></tr>`;
  if(hist[r.Index]){
    hist[r.Index].labels.push(new Date().toLocaleTimeString());
    hist[r.Index].data.push(Number(r.PCR));
    if(hist[r.Index].labels.length>100){hist[r.Index].labels.shift();hist[r.Index].data.shift();}
    charts[r.Index].update();
  }
 });
}
load();
setInterval(load,30000);
</script>
</body>
</html>
