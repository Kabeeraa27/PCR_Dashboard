<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Option Chain Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    font-family:'DM Sans',sans-serif;
    background:#f0ebe3;
    color:#2d2f33;
    margin:0;
    padding:48px;
    line-height:1.6;
}
h1{
    font-family:'Playfair Display',serif;
    font-size:52px;
    font-weight:800;
    color:#3d8269;
    margin-bottom:8px;
    letter-spacing:-1px;
}

.sub{
    color:#666;
    font-size:18px;
    margin-bottom:40px;
}
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:22px;
    margin-bottom:42px;
}

.card{
    background:white;
    padding:24px;
    border-radius:22px;
    border-left:8px solid #3d8269;
    transition:0.3s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
    transition:all .25s ease;
}

.card h3{
    font-family:'Playfair Display',serif;
    font-size:24px;
    margin-bottom:18px;
}

.panel {
    min-height: 360px;
}

canvas {
    width: 100% !important;
    height: 320px !important;
}

.metric{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-family:'JetBrains Mono',monospace;
}
table{
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:45px;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
}

th{
    background:#3d8269;
    color:white;
    padding:16px;
    font-family:'DM Sans',sans-serif;
}

td{
    padding:14px;
    border-bottom:1px solid #ececec;
    font-family:'JetBrains Mono',monospace;
}

th,
td {
    text-align: center;
    vertical-align: middle;
}

td:first-child {
    text-align: left;
}


.panel{
    background:white;
    border-radius:22px;
    padding:22px;
    box-shadow:0 8px 30px rgba(0,0,0,.05);
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:28px;
    margin-top:32px;
}

@media(max-width:1100px){
    .cards{
        grid-template-columns:repeat(2,1fr);
    }

    .grid{
        grid-template-columns:1fr;
    }
}

.card{
    position:relative;
    overflow:hidden;
}

.flash-update {
    background-color: #3d8269;
    color: #2d2f33 !important;
    padding: 3px 8px;
    border-radius: 6px;
    animation: flashValue 2s ease forwards;
}

@keyframes flashValue {
    0%, 80% {
        background-color: #3d8269;
    }

    100% {
        background-color: transparent;
    }
}

.card {
    border-left: 8px solid transparent;
}

/* NIFTY - Violet */
.card.NIFTY {
    border-left-color: #7c3aed;
}

/* BANKNIFTY - Blue */
.card.BANKNIFTY {
    border-left-color: #2563eb;
}

/* FINNIFTY - Orange */
.card.FINNIFTY {
    border-left-color: #d97706;
}

/* MIDCPNIFTY - Red */
.card.MIDCPNIFTY {
    border-left-color: #dc2626;
}

</style>
</head>
<body>
<center><h1>📈 Live Option Chain Dashboard</h1></center>
<br></br>
<div class="cards" id="cards"></div>
<table><thead><tr><th>Index</th><th>Spot</th><th>PCR</th><th>Change OI PCR</th><th>VWAP</th></tr></thead><tbody id="tbody"></tbody></table>
<div class="panel">
    <canvas id="combinedChart"></canvas>
</div>
<script>


const previousValues = {};
const labels = [];

const datasets = {
    NIFTY: [],
    BANKNIFTY: [],
    FINNIFTY: [],
    MIDCPNIFTY: []
};

const combinedChart = new Chart(
    document.getElementById("combinedChart"),
    {
        type: "line",

        data: {
            labels: labels,
            datasets: [
                {
                    label: "NIFTY",
                    data: datasets.NIFTY,
                    borderColor: "#7c3aed",
                    backgroundColor: "transparent",
                    borderWidth: 3,
                    tension: 0.35,
                    fill: false,
                    pointRadius: 2,
                },
                {
                    label: "BANKNIFTY",
                    data: datasets.BANKNIFTY,
                    borderColor: "#2563eb",
                    backgroundColor: "transparent",
                    borderWidth: 3,
                    tension: 0.35,
                    fill: false,
                    pointRadius: 2,
                },
                {
                    label: "FINNIFTY",
                    data: datasets.FINNIFTY,
                    borderColor: "#d97706",
                    backgroundColor: "transparent",
                    borderWidth: 3,
                    tension: 0.35,
                    fill: false,
                    pointRadius: 2,
                },
                {
                    label: "MIDCPNIFTY",
                    data: datasets.MIDCPNIFTY,
                    borderColor: "#dc2626",
                    backgroundColor: "transparent",
                    borderWidth: 3,
                    tension: 0.35,
                    fill: false,
                    pointRadius: 2,
                }
            ]
        },

        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,

            scales: {
                y: {
                    min: 0.5,
                    max: 1.5
                }
            }
        }
    }
);


async function load() {

    const res = await fetch("/dashboard.json");

    const data = await res.json();

    const cards = document.getElementById("cards");

    const tbody = document.getElementById("tbody");

    cards.innerHTML = "";

    tbody.innerHTML = "";

    data.forEach(r => {

        // ===========================
        // Cards
        // ===========================

        const prev = previousValues[r.Index] || {};

        const spotChanged =
            prev.spot !== undefined &&
            Number(prev.spot) !== Number(r.Spot);

        const pcrChanged =
            prev.pcr !== undefined &&
            Number(prev.pcr) !== Number(r.PCR);

        const chgChanged =
            prev.change !== undefined &&
            Number(prev.change) !== Number(r.Change_OI_PCR);

        const vwapChanged =
            prev.vwap !== undefined &&
            Number(prev.vwap) !== Number(r.VWAP);

        cards.innerHTML += `
    <div class="card ${r.Index}">

            <h3>${r.Index}</h3>

            <div class="metric">
                <span>Spot</span>
                <span class="${spotChanged ? "flash-update" : ""}">
                    ${Number(r.Spot).toFixed(2)}
                </span>
            </div>

            <div class="metric">
                <span>PCR</span>
                <span class="${pcrChanged ? "flash-update" : ""}">
                    ${Number(r.PCR).toFixed(3)}
                </span>
            </div>

            <div class="metric">
                <span>Chg PCR</span>
                <span class="${chgChanged ? "flash-update" : ""}">
                    ${Number(r.Change_OI_PCR).toFixed(3)}
                </span>
            </div>

            <div class="metric">
                <span>VWAP</span>
                <span class="${vwapChanged ? "flash-update" : ""}">
                    ${Number(r.VWAP).toFixed(2)}
                </span>
            </div>

        </div>
        `;


        // ===========================
        // Table
        // ===========================

        tbody.innerHTML += `
        <tr>
            <td>${r.Index}</td>
            <td>
                <span class="${spotChanged ? "flash-update" : ""}">
                    ${Number(r.Spot).toFixed(2)}
                </span>
            </td>
            <td>
                <span class="${pcrChanged ? "flash-update" : ""}">
                    ${Number(r.PCR).toFixed(3)}
                </span>
            </td>
            <td>
                <span class="${chgChanged ? "flash-update" : ""}">
                    ${Number(r.Change_OI_PCR).toFixed(3)}
                </span>
            </td>
            <td>
                <span class="${vwapChanged ? "flash-update" : ""}">
                    ${Number(r.VWAP).toFixed(2)}
                </span>
            </td>
        </tr>
        `;

        // ===========================
        // Chart update
        // ===========================

        const now = new Date();

        const marketClose = new Date();

        marketClose.setHours(15, 30, 0, 0);

        const roundedMinute =
            Math.floor(now.getMinutes() / 2) * 2;

        const timeLabel =
            now.getHours().toString().padStart(2, "0")
            + ":"
            + roundedMinute.toString().padStart(2, "0");

            if (now <= marketClose) {

                if (
                    labels.length === 0 ||
                    labels[labels.length - 1] !== timeLabel
                ) {
                    labels.push(timeLabel);
                }

                datasets[r.Index].push(Number(r.PCR));

                // Keep arrays the same length
                while (datasets[r.Index].length > labels.length) {
                    datasets[r.Index].shift();
                }

                if (labels.length > 200) {

                    labels.shift();

                    Object.keys(datasets).forEach(key => {
                        if (datasets[key].length > 0) {
                            datasets[key].shift();
                        }
                    });

                }

                combinedChart.update();
            }


    previousValues[r.Index] = {
    spot: r.Spot,
    pcr: r.PCR,
    change: r.Change_OI_PCR,
    vwap: r.VWAP
};

    });
}
load();
setInterval(load,30000);
</script>
</body>
</html>
