<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Option Chain Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    font-family:'DM Sans',sans-serif;
    background:#f0ebe3;
    color:#2d2f33;
    margin:0;
    padding:48px;
    line-height:1.6;
}
h1{
    font-family:'Playfair Display',serif;
    font-size:52px;
    font-weight:800;
    color:#3d8269;
    margin-bottom:8px;
    letter-spacing:-1px;
}

.sub{
    color:#666;
    font-size:18px;
    margin-bottom:40px;
}
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:22px;
    margin-bottom:42px;
}

.card{
    background:white;
    padding:24px;
    border-radius:22px;
    border-left:8px solid #3d8269;
    transition:0.3s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
    transition:all .25s ease;
}

.card h3{
    font-family:'Playfair Display',serif;
    font-size:24px;
    margin-bottom:18px;
}

.panel {
    min-height: 360px;
}

canvas {
    width: 100% !important;
    height: 320px !important;
}

.metric{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-family:'JetBrains Mono',monospace;
}
table{
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:45px;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
}

th{
    background:#3d8269;
    color:white;
    padding:16px;
    font-family:'DM Sans',sans-serif;
}

td{
    padding:14px;
    border-bottom:1px solid #ececec;
    font-family:'JetBrains Mono',monospace;
}

th,
td {
    text-align: center;
    vertical-align: middle;
}

td:first-child {
    text-align: left;
}


.panel{
    background:white;
    border-radius:22px;
    padding:22px;
    box-shadow:0 8px 30px rgba(0,0,0,.05);
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:28px;
    margin-top:32px;
}

@media(max-width:1100px){
    .cards{
        grid-template-columns:repeat(2,1fr);
    }

    .grid{
        grid-template-columns:1fr;
    }
}

.card{
    position:relative;
    overflow:hidden;
}

.flash-update {
    background-color: #3d8269;
    color: #2d2f33 !important;
    padding: 3px 8px;
    border-radius: 6px;
    animation: flashValue 2s ease forwards;
}

@keyframes flashValue {
    0%, 80% {
        background-color: #3d8269;
    }

    100% {
        background-color: transparent;
    }
}

.card {
    border-left: 8px solid transparent;
}

/* NIFTY - Violet */
.card.NIFTY {
    border-left-color: #7c3aed;
}

/* BANKNIFTY - Blue */
.card.BANKNIFTY {
    border-left-color: #2563eb;
}

/* FINNIFTY - Orange */
.card.FINNIFTY {
    border-left-color: #d97706;
}

/* MIDCPNIFTY - Red */
.card.MIDCPNIFTY {
    border-left-color: #dc2626;
}

.legend-buttons {
    display: flex;
    justify-content: center;   /* <-- centers buttons */
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 0 auto 20px auto;
}

.legend-buttons button {
    border: none;
    border-radius: 999px;
    padding: 8px 16px;
    font-weight: 600;
    cursor: pointer;
    color: white;
    transition: 0.2s ease;
}

.legend-buttons button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

.legend-buttons button.disabled {
    opacity: 0.35;
    text-decoration: line-through;
}

.heatmap-controls{
    margin:20px 0;
    text-align:center;
}

#heatmapIndex{
    padding:10px 16px;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
}

#heatmap{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(130px,1fr));
    gap:10px;
    margin-top:20px;
}

.heat-box{
    border-radius:10px;
    padding:15px;
    text-align:center;
    color:white;
    font-weight:bold;
    transition:0.2s;
}

.heat-box:hover{
    transform:scale(1.04);
}

</style>
</head>

<body>
<center><h1>📈 Live Option Chain Dashboard</h1></center>
<br></br>
<div class="cards" id="cards"></div>
<table><thead><tr><th>Index</th><th>Spot</th><th>PCR</th><th>Change OI PCR</th><th>VWAP</th></tr></thead><tbody id="tbody"></tbody></table>
<br>

<div class="panel">
    <div id="pcrLegend" class="legend-buttons">
        <button style="background:#7c3aed" onclick="toggleDataset(pcrChart,0,this)">NIFTY</button>
        <button style="background:#2563eb" onclick="toggleDataset(pcrChart,1,this)">BANKNIFTY</button>
        <button style="background:#d97706" onclick="toggleDataset(pcrChart,2,this)">FINNIFTY</button>
        <button style="background:#dc2626" onclick="toggleDataset(pcrChart,3,this)">MIDCPNIFTY</button>
    </div>

    <canvas id="pcrChart"></canvas>
</div>

<div class="panel">
    <div id="spotLegend" class="legend-buttons">
        <button style="background:#7c3aed" onclick="toggleDataset(spotChart,0,this)">NIFTY</button>
        <button style="background:#2563eb" onclick="toggleDataset(spotChart,1,this)">BANKNIFTY</button>
        <button style="background:#d97706" onclick="toggleDataset(spotChart,2,this)">FINNIFTY</button>
        <button style="background:#dc2626" onclick="toggleDataset(spotChart,3,this)">MIDCPNIFTY</button>
    </div>

    <canvas id="spotChart"></canvas>
</div>


<div class="heatmap-controls">
    <label for="heatmapIndex"><b>Heatmap Index:</b></label>

    <select id="heatmapIndex">
        <option value="NIFTY">NIFTY 50</option>
        <option value="BANKNIFTY">BANKNIFTY</option>
        <option value="FINNIFTY">FINNIFTY</option>
        <option value="MIDCPNIFTY">MIDCPNIFTY</option>
    </select>
</div>

<div id="heatmap"></div>

<script>


function getHeatColor(p) {

    if (p >= 2) return "#006400";
    if (p >= 1) return "#16a34a";
    if (p >= 0.25) return "#4ade80";

    if (p <= -2) return "#8b0000";
    if (p <= -1) return "#dc2626";
    if (p <= -0.25) return "#f87171";

    return "#9ca3af";
}

async function loadHeatmap() {
    try {
        const index = document.getElementById("heatmapIndex").value;

        const res = await fetch(`/heatmap.json?index=${index}`);
        const stocks = await res.json();

        console.log("Heatmap response:", stocks);

        const root = document.getElementById("heatmap");
        root.innerHTML = "";

        if (!Array.isArray(stocks)) {
            root.innerHTML = "<h3>Invalid heatmap response</h3>";
            return;
        }

        stocks.forEach(s => {
            root.innerHTML += `
                <div class="heat-box" style="background:${getHeatColor(s.pChange)}">
                    <div>${s.symbol}</div>
                    <div>₹${Number(s.lastPrice).toLocaleString()}</div>
                    <div>${s.pChange > 0 ? "+" : ""}${s.pChange.toFixed(2)}%</div>
                </div>
            `;
        });

    } catch (e) {
        console.error(e);
    }
}



document
.getElementById("heatmapIndex")
.addEventListener(
    "change",
    loadHeatmap
);

loadHeatmap();

setInterval(loadHeatmap,30000);


// Restore previous chart data if available
const savedPCR = {};
const savedSpot = {};
const previousValues = {};
const labels = [];
let historyLoaded = false;

function generateTimeline() {

    let current = new Date();
    current.setHours(9, 15, 0, 0);

    const end = new Date();
    end.setHours(15, 30, 0, 0);

    while (current <= end) {

        labels.push(
            current.toLocaleTimeString("en-IN", {
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            })
        );

        // 1-minute interval
        current.setMinutes(current.getMinutes() + 1);
    }
}


generateTimeline();


const datasets = {
    NIFTY: savedPCR.NIFTY || new Array(labels.length).fill(null),
    BANKNIFTY: savedPCR.BANKNIFTY || new Array(labels.length).fill(null),
    FINNIFTY: savedPCR.FINNIFTY || new Array(labels.length).fill(null),
    MIDCPNIFTY: savedPCR.MIDCPNIFTY || new Array(labels.length).fill(null)
};

const spotDatasets = {
    NIFTY: savedSpot.NIFTY || new Array(labels.length).fill(null),
    BANKNIFTY: savedSpot.BANKNIFTY || new Array(labels.length).fill(null),
    FINNIFTY: savedSpot.FINNIFTY || new Array(labels.length).fill(null),
    MIDCPNIFTY: savedSpot.MIDCPNIFTY || new Array(labels.length).fill(null)
};




const pcrChart = new Chart(document.getElementById("pcrChart"), {
    type: "line",

    data: {
        labels: labels,
        datasets: [
            {
                label: "NIFTY",
                data: datasets.NIFTY,
                borderColor: "#7c3aed",
                borderWidth: 2.5,
                spanGaps: false,
                pointRadius: 0,
                pointHoverRadius: 6
            },
            {
                label: "BANKNIFTY",
                data: datasets.BANKNIFTY,
                borderColor: "#2563eb",
                borderWidth: 2.5,
                spanGaps: false,
                pointRadius: 0,
                pointHoverRadius: 6
            },
            {
                label: "FINNIFTY",
                data: datasets.FINNIFTY,
                borderColor: "#d97706",
                borderWidth: 2.5,
                spanGaps: false,
                pointRadius: 0,
                pointHoverRadius: 6
            },
            {
                label: "MIDCPNIFTY",
                data: datasets.MIDCPNIFTY,
                borderColor: "#dc2626",
                borderWidth: 2.5,
                spanGaps: false,
                pointRadius: 0,
                pointHoverRadius: 6
            }
        ]
    },

    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,

        interaction: {
            mode: "index",
            intersect: false
        },

        plugins: {
            title: {
                display: true,
                text: "📈 Live Put-Call Ratio (PCR) Trend",
                font: {
                    size: 20,
                    weight: "bold"
                },
                padding: {
                    top: 10,
                    bottom: 20
                }
            },

            legend: {
                display: false
            },

            tooltip: {
                enabled: true,
                mode: "index",
                intersect: false
            }
        },

scales: {
    x: {
        grid: {
            display: false
        },

        // Keep the X-axis line
        border: {
            display: true,
            color: "#999",
            width: 1
        },

        ticks: {
            autoSkip: false,
            maxRotation: 0,
            minRotation: 0,
            font: {
                family: "JetBrains Mono"
            },
            callback: function(value, index) {

                // 09:15, 10:15, ..., 15:15
                if (index % 60 === 0) {
                    return this.getLabelForValue(value);
                }

                // Always show 15:30
                if (index === labels.length - 1) {
                    return this.getLabelForValue(value);
                }

                return "";
            }
        }
    },

y: {
    beginAtZero: false,

    grace: "5%",

    grid: {
        display: false
    },

    border: {
        display: true,
        color: "#999",
        width: 1
    },

    ticks: {
        callback: function(value) {
            return Number(value).toLocaleString("en-IN");
        }
    }
}
}
    }
});


const spotChart = new Chart(document.getElementById("spotChart"), {
    type: "line",

    data: {
        labels: labels,
        datasets: [
            {
                label: "NIFTY",
                data: spotDatasets.NIFTY,
                borderColor: "#7c3aed",
                borderWidth: 2.5,
                pointRadius: 0,
                pointHoverRadius: 6
            },
            {
                label: "BANKNIFTY",
                data: spotDatasets.BANKNIFTY,
                borderColor: "#2563eb",
                borderWidth: 2.5,
                pointRadius: 0,
                pointHoverRadius: 6
            },
            {
                label: "FINNIFTY",
                data: spotDatasets.FINNIFTY,
                borderColor: "#d97706",
                borderWidth: 2.5,
                pointRadius: 0,
                pointHoverRadius: 6
            },
            {
                label: "MIDCPNIFTY",
                data: spotDatasets.MIDCPNIFTY,
                borderColor: "#dc2626",
                borderWidth: 2.5,
                pointRadius: 0,
                pointHoverRadius: 6
            }
        ]
    },

    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,

        interaction: {
            mode: "index",
            intersect: false
        },

        plugins: {
            title: {
                display: true,
                text: "💹 Live Underlying Spot Price Trend",
                font: {
                    size: 20,
                    weight: "bold"
                },
                padding: {
                    top: 10,
                    bottom: 20
                }
            },

            legend: {
                display: false
            },

            tooltip: {
                enabled: true,
                mode: "index",
                intersect: false
            }
        },

scales: {
    x: {
        grid: {
            display: false
        },

        // Keep the X-axis line
        border: {
            display: true,
            color: "#999",
            width: 1
        },

        ticks: {
            autoSkip: false,
            maxRotation: 0,
            minRotation: 0,
            font: {
                family: "JetBrains Mono"
            },
            callback: function(value, index) {

                // 09:15, 10:15, ..., 15:15
                if (index % 60 === 0) {
                    return this.getLabelForValue(value);
                }

                // Always show 15:30
                if (index === labels.length - 1) {
                    return this.getLabelForValue(value);
                }

                return "";
            }
        }
    },

y: {
    beginAtZero: false,

    grace: "5%",

    grid: {
        display: false
    },

    border: {
        display: true,
        color: "#999",
        width: 1
    },

    ticks: {
        callback: function(value) {
            return Number(value).toLocaleString("en-IN");
        }
    }
}
}
    }


});

function toggleDataset(chart, index, button) {
    const visible = chart.isDatasetVisible(index);

    chart.setDatasetVisibility(index, !visible);

    if (visible) {
        button.classList.add("disabled");
    } else {
        button.classList.remove("disabled");
    }

    chart.update();
}


async function load() {

    const res = await fetch("/dashboard.json");
    const data = await res.json();
    const cards = document.getElementById("cards");
    const tbody = document.getElementById("tbody");
        
    if (!historyLoaded) {

        const historyRes = await fetch("/history.json");
        const history = await historyRes.json();

        const indexList = [
            "NIFTY",
            "BANKNIFTY",
            "FINNIFTY",
            "MIDCPNIFTY"
        ];

        history.labels.forEach((label, idx) => {

            const pos = labels.indexOf(label);

            if (pos !== -1) {

                indexList.forEach(symbol => {

                    datasets[symbol][pos] =
                        history.pcr[symbol]?.[idx] ?? null;

                    spotDatasets[symbol][pos] =
                        history.spot[symbol]?.[idx] ?? null;

                });

            }

        });

        historyLoaded = true;

    }


    cards.innerHTML = "";
    tbody.innerHTML = "";

    data.forEach(r => {

        // ===========================
        // Cards
        // ===========================

        const prev = previousValues[r.Index] || {};

        const spotChanged =
            prev.spot !== undefined &&
            Number(prev.spot) !== Number(r.Spot);

        const pcrChanged =
            prev.pcr !== undefined &&
            Number(prev.pcr) !== Number(r.PCR);

        const chgChanged =
            prev.change !== undefined &&
            Number(prev.change) !== Number(r.Change_OI_PCR);

        const vwapChanged =
            prev.vwap !== undefined &&
            Number(prev.vwap) !== Number(r.VWAP);

        cards.innerHTML += `
    <div class="card ${r.Index}">

            <h3>${r.Index}</h3>

            <div class="metric">
                <span>Spot</span>
                <span class="${spotChanged ? "flash-update" : ""}">
                    ${Number(r.Spot).toFixed(2)}
                </span>
            </div>

            <div class="metric">
                <span>PCR</span>
                <span class="${pcrChanged ? "flash-update" : ""}">
                    ${Number(r.PCR).toFixed(3)}
                </span>
            </div>

            <div class="metric">
                <span>Chg PCR</span>
                <span class="${chgChanged ? "flash-update" : ""}">
                    ${Number(r.Change_OI_PCR).toFixed(3)}
                </span>
            </div>

            <div class="metric">
                <span>VWAP</span>
                <span class="${vwapChanged ? "flash-update" : ""}">
                    ${Number(r.VWAP).toFixed(2)}
                </span>
            </div>

        </div>
        `;


        // ===========================
        // Table
        // ===========================

        tbody.innerHTML += `
        <tr>
            <td>${r.Index}</td>
            <td>
                <span class="${spotChanged ? "flash-update" : ""}">
                    ${Number(r.Spot).toFixed(2)}
                </span>
            </td>
            <td>
                <span class="${pcrChanged ? "flash-update" : ""}">
                    ${Number(r.PCR).toFixed(3)}
                </span>
            </td>
            <td>
                <span class="${chgChanged ? "flash-update" : ""}">
                    ${Number(r.Change_OI_PCR).toFixed(3)}
                </span>
            </td>
            <td>
                <span class="${vwapChanged ? "flash-update" : ""}">
                    ${Number(r.VWAP).toFixed(2)}
                </span>
            </td>
        </tr>
        `;

        // ===========================
        // Chart update
        // ===========================

        const now = new Date();

        const marketClose = new Date();

        marketClose.setHours(15, 30, 0, 0);

        const timeLabel =
            now.toLocaleTimeString("en-IN", {
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            });
        const totalMinutes = now.getHours() * 60 + now.getMinutes();

        if (totalMinutes >= 9 * 60 + 15 && totalMinutes <= 15 * 60 + 30) {
            const idx = labels.indexOf(timeLabel);

            if (idx !== -1) {
                datasets[r.Index][idx] = Number(r.PCR);
                spotDatasets[r.Index][idx] = Number(r.Spot);
            }
        }

    previousValues[r.Index] = {
    spot: r.Spot,
    pcr: r.PCR,
    change: r.Change_OI_PCR,
    vwap: r.VWAP
    
};

    });

    pcrChart.update();
    spotChart.update();

}
load();
setInterval(load,30000);
</script>
</body>
</html>
