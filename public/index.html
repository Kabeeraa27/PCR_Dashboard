<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Option Chain Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    font-family:'DM Sans',sans-serif;
    background:#f0ebe3;
    color:#2d2f33;
    margin:0;
    padding:48px;
    line-height:1.6;
}
h1{
    font-family:'Playfair Display',serif;
    font-size:52px;
    font-weight:800;
    color:#3d8269;
    margin-bottom:8px;
    letter-spacing:-1px;
}

.sub{
    color:#666;
    font-size:18px;
    margin-bottom:40px;
}
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:22px;
    margin-bottom:42px;
}

.card{
    background:white;
    padding:24px;
    border-radius:22px;
    border-left:8px solid #3d8269;
    transition:0.3s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
    transition:all .25s ease;
}

.card h3{
    font-family:'Playfair Display',serif;
    font-size:24px;
    margin-bottom:18px;
}

.panel {
    min-height: 360px;
}

canvas {
    width: 100% !important;
    height: 320px !important;
}

.metric{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-family:'JetBrains Mono',monospace;
}
table{
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:45px;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
}

th{
    background:#3d8269;
    color:white;
    padding:16px;
    font-family:'DM Sans',sans-serif;
}

td{
    padding:14px;
    border-bottom:1px solid #ececec;
    font-family:'JetBrains Mono',monospace;
}

.panel{
    background:white;
    border-radius:22px;
    padding:22px;
    box-shadow:0 8px 30px rgba(0,0,0,.05);
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:28px;
    margin-top:32px;
}

@media(max-width:1100px){
    .cards{
        grid-template-columns:repeat(2,1fr);
    }

    .grid{
        grid-template-columns:1fr;
    }
}

.card{
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:6px;
    height:100%;
    background:#3d8269;
}
</style>
</head>
<body>
<h1>📈 Live Option Chain Dashboard</h1>
<div class="sub">Refreshes every 30 seconds from /dashboard.json</div>
<div class="cards" id="cards"></div>
<table><thead><tr><th>Index</th><th>Spot</th><th>PCR</th><th>Change OI PCR</th><th>VWAP</th></tr></thead><tbody id="tbody"></tbody></table>
<div class="grid">
<div class="panel"><canvas id="cN"></canvas></div>
<div class="panel"><canvas id="cB"></canvas></div>
<div class="panel"><canvas id="cF"></canvas></div>
<div class="panel"><canvas id="cM"></canvas></div>
</div>
<script>
const hist={}; const charts={};

function makeChart(id,label){

    hist[label]={
        labels:[],
        data:[]
    };

    charts[label]=new Chart(

        document.getElementById(id),

        {

            type:"line",

            data:{

                labels:hist[label].labels,

                datasets:[{

                    label:label+" PCR",

                    data:hist[label].data,

                    borderColor:"#3d8269",

                    backgroundColor:"rgba(61,130,105,0.12)",

                    borderWidth:3,

                    fill:true,

                    tension:0.35,

                    pointRadius:2

                }]

            },

            plugins: {
                title: {
                    display: true,
                    text: label + " PCR Trend",
                    font: {
                        family: "Playfair Display",
                        size: 18
                    },
                    color: "#2d2f33"
                },
                legend: {
                    labels: {
                        font: {
                            family: "DM Sans"
                        }
                    }
                }
            },

            options:{

                responsive:true,

                maintainAspectRatio:false,

                animation:false,

                interaction:{
                    mode:"index",
                    intersect:false
                },

                plugins:{
                    legend:{
                        labels:{
                            font:{
                                family:"DM Sans"
                            }
                        }
                    }
                },

                scales:{
                    x:{
                        ticks:{
                              maxTicksLimit: 8,
                            font:{
                                family:"JetBrains Mono"
                            }
                        }
                    },
                    y:{
                        ticks:{
                            font:{
                                family:"JetBrains Mono"
                            }
                        }
                    }
                }

            }
            

        }

    );

}

makeChart("cN","NIFTY");
makeChart("cB","BANKNIFTY");
makeChart("cF","FINNIFTY");
makeChart("cM","MIDCPNIFTY");

async function load(){
 const res=await fetch('/dashboard.json');
 const data=await res.json();
 const cards=document.getElementById('cards');
 const tbody=document.getElementById('tbody');
 cards.innerHTML=''; tbody.innerHTML='';
 data.forEach(r=>{
  cards.innerHTML+=`<div class="card"><h3>${r.Index}</h3>
  <div class="metric"><span>Spot</span><span>${Number(r.Spot).toFixed(2)}</span></div>
  <div class="metric"><span>PCR</span><span>${Number(r.PCR).toFixed(3)}</span></div>
  <div class="metric"><span>Chg PCR</span><span>${Number(r.Change_OI_PCR).toFixed(3)}</span></div>
  <div class="metric"><span>VWAP</span><span>${Number(r.VWAP).toFixed(2)}</span></div></div>`;
  tbody.innerHTML+=`<tr><td>${r.Index}</td><td>${Number(r.Spot).toFixed(2)}</td><td>${Number(r.PCR).toFixed(3)}</td><td>${Number(r.Change_OI_PCR).toFixed(3)}</td><td>${Number(r.VWAP).toFixed(2)}</td></tr>`;

  const now = new Date();

  const marketClose = new Date();

  marketClose.setHours(15, 30, 0, 0);

  const timeLabel = now.toLocaleTimeString(
      "en-IN",
      {
          hour: "2-digit",
          minute: "2-digit"
      }
  );

  if (hist[r.Index] && now <= marketClose) {

      // Prevent duplicate points for the same minute
      if (
          hist[r.Index].labels.length === 0 ||
          hist[r.Index].labels[
              hist[r.Index].labels.length - 1
          ] !== timeLabel
      ) {

          hist[r.Index].labels.push(timeLabel);

          if (hist[r.Index].labels.length > 500) {
              hist[r.Index].labels.shift();
              hist[r.Index].data.shift();
          }

      }

      charts[r.Index].update();

  }

 });
}
load();
setInterval(load,30000);
</script>
</body>
</html>
